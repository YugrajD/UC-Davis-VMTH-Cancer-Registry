name: CI

on:
  push:
    branches: [main, database]
  pull_request:
    branches: [main, database]

jobs:
  # ---------------------------------------------------------------------------
  # Backend — pytest unit tests (DB is fully mocked, no PostgreSQL needed)
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run pytest
        env:
          # Minimal settings so pydantic-settings doesn't error on missing vars.
          # DB is mocked in all tests so DATABASE_URL is never used.
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          DATABASE_URL_SYNC: postgresql://test:test@localhost/test
          SUPABASE_JWT_SECRET: test-secret
        run: pytest -v

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript type check, lint, and vitest unit tests
  # ---------------------------------------------------------------------------
  frontend-tests:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Vitest unit tests
        run: npm test
