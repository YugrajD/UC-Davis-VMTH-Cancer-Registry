services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:5173"]'}
      ML_WORKER_URL: ${ML_WORKER_URL:-http://ml-worker:8001}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      UPLOAD_DIR: /app/uploads
      # GCP Batch (optional)
      USE_GCP_BATCH: ${USE_GCP_BATCH:-false}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_REGION: ${GCP_REGION:-us-central1}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCP_BATCH_IMAGE_URI: ${GCP_BATCH_IMAGE_URI:-}
      GCP_BATCH_SERVICE_ACCOUNT: ${GCP_BATCH_SERVICE_ACCOUNT:-}
      GCP_BATCH_MACHINE_TYPE: ${GCP_BATCH_MACHINE_TYPE:-n1-standard-4}
      GCP_BATCH_POLL_INTERVAL: ${GCP_BATCH_POLL_INTERVAL:-60}
      GCP_BATCH_TIMEOUT_HOURS: ${GCP_BATCH_TIMEOUT_HOURS:-12}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - ./secrets:/app/secrets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vmth_cancer_frontend
    environment:
      # VITE_API_URL is intentionally empty in dev: the browser must use
      # relative URLs so they go through the Vite dev-server proxy. The
      # proxy itself uses DEV_PROXY_TARGET (read in vite.config.ts) to
      # forward to the backend over the docker network.
      VITE_API_URL: ""
      DEV_PROXY_TARGET: http://backend:8000
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npx vite --host 0.0.0.0"

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_seed
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
    volumes:
      - ./database:/database
      - ./backend:/app
      - ./geo:/geo
      - ./ml:/ml
    command: python /database/seed/seed_mock_data.py
    profiles:
      - seed

  ingest:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_ingest
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      DATA_DIR: /database/data
      GEO_DATA_DIR: /geo/data
    volumes:
      - ./database:/database
      - ./backend:/app
      - ./geo:/geo
    command: python /database/seed/ingest_petbert.py
    profiles:
      - ingest

  geo-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_geo_seed
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      GEO_DATA_DIR: /geo/data
    volumes:
      - ./database:/database
      - ./geo:/geo
    command: python /database/seed/county_boundaries.py
    profiles:
      - geo-seed

  ml-worker:
    build: ./ml-worker
    container_name: vmth_cancer_ml_worker
    volumes:
      - ./ml-worker:/worker
      - ./ml:/ml
    environment:
      HF_HOME: /ml/.cache/huggingface
      PETBERT_MODEL_PATH: ${PETBERT_MODEL_PATH:-/ml/models/petbert}
      LABELS_CSV_PATH: ${LABELS_CSV_PATH:-/ml/ICD_labels/labels.csv}
      GROUP_CLASSIFIER_PATH: ${GROUP_CLASSIFIER_PATH:-/ml/output/checkpoints/group/group_classifier_best.pt}
      CASE_PRESENCE_CLASSIFIER_PATH: ${CASE_PRESENCE_CLASSIFIER_PATH:-}
      LP_THRESHOLDS_JSON_PATH: ${LP_THRESHOLDS_JSON_PATH:-}
      UNCOMMON_GROUPS_PATH: ${UNCOMMON_GROUPS_PATH:-}
    command: uvicorn app:app --host 0.0.0.0 --port 8001 --reload

volumes:
  frontend_node_modules:
