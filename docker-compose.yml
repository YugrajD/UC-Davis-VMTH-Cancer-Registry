services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:5173"]'}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vmth_cancer_frontend
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install --legacy-peer-deps && npx vite --host 0.0.0.0"

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_seed
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
    volumes:
      - ./database:/database
      - ./backend:/app
      - ./geo:/geo
      - ./ml:/ml
    command: python /database/seed/seed_mock_data.py
    profiles:
      - seed

  ingest:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_ingest
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      DATA_DIR: /database/data
      GEO_DATA_DIR: /geo/data
    volumes:
      - ./database:/database
      - ./backend:/app
      - ./geo:/geo
    command: python /database/seed/ingest_petbert.py
    profiles:
      - ingest

  geo-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_geo_seed
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      GEO_DATA_DIR: /geo/data
    volumes:
      - ./database:/database
      - ./geo:/geo
    command: python /database/seed/county_boundaries.py
    profiles:
      - geo-seed

volumes:
  frontend_node_modules:
