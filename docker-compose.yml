services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:5173"]'}
      ML_WORKER_URL: ${ML_WORKER_URL:-http://ml-worker:8001}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vmth_cancer_frontend
    environment:
      VITE_API_URL: http://backend:8000
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npx vite --host 0.0.0.0"

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_seed
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
    volumes:
      - ./database:/database
      - ./backend:/app
      - ./geo:/geo
      - ./ml:/ml
    command: python /database/seed/seed_mock_data.py
    profiles:
      - seed

  ingest:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_ingest
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      DATA_DIR: /database/data
      GEO_DATA_DIR: /geo/data
    volumes:
      - ./database:/database
      - ./backend:/app
      - ./geo:/geo
    command: python /database/seed/ingest_petbert.py
    profiles:
      - ingest

  geo-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmth_cancer_geo_seed
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      GEO_DATA_DIR: /geo/data
    volumes:
      - ./database:/database
      - ./geo:/geo
    command: python /database/seed/county_boundaries.py
    profiles:
      - geo-seed

  ml-worker:
    build: ./ml-worker
    container_name: vmth_cancer_ml_worker
    volumes:
      - ./ml:/ml
    ports:
      - "8001:8001"
    environment:
      HF_HOME: /ml/.cache/huggingface
      PETBERT_MODEL_PATH: ${PETBERT_MODEL_PATH:-/ml/models/petbert}
    command: uvicorn app:app --host 0.0.0.0 --port 8001

volumes:
  frontend_node_modules:
  uploads_data:
